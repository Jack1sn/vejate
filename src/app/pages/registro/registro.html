<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-[420px]">
    <h2 class="text-2xl font-bold mb-6 text-green-700">
      Criar Conta
    </h2>

    <!-- Nome -->
    <div class="mb-4">
      <label class="block mb-1">Nome</label>
      <input type="text"
             [(ngModel)]="nome"
             class="w-full px-3 py-2 border rounded"
             placeholder="Digite seu nome">
    </div>

    <!-- Email -->
    <div class="mb-4">
      <label class="block mb-1">Email</label>
      <input type="email"
             [(ngModel)]="email"
             class="w-full px-3 py-2 border rounded"
             placeholder="Digite seu email">
    </div>

    <!-- CEP -->
    <div class="mb-4">
      <label class="block mb-1">CEP</label>
      <input type="text"
             maxlength="8"
             [(ngModel)]="cep"
             (blur)="buscarCep()"
             class="w-full px-3 py-2 border rounded"
             placeholder="Digite o CEP (somente números)">
    </div>

    <!-- Endereço automático -->
    <div class="mb-3">
      <label class="block mb-1">Logradouro</label>
      <input type="text"
             [(ngModel)]="logradouro"
             class="w-full px-3 py-2 border rounded bg-gray-100"
             readonly>
    </div>

    <div class="mb-3">
      <label class="block mb-1">Bairro</label>
      <input type="text"
             [(ngModel)]="bairro"
             class="w-full px-3 py-2 border rounded bg-gray-100"
             readonly>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-4">
      <div>
        <label class="block mb-1">Cidade</label>
        <input type="text"
               [(ngModel)]="cidade"
               class="w-full px-3 py-2 border rounded bg-gray-100"
               readonly>
      </div>

      <div>
        <label class="block mb-1">UF</label>
        <input type="text"
               [(ngModel)]="estado"
               class="w-full px-3 py-2 border rounded bg-gray-100"
               readonly>
      </div>
    </div>

    <!-- Erro -->
    <div *ngIf="erro" class="text-red-500 mb-3">
      {{ erro }}
    </div>

    <!-- Sucesso -->
    <div *ngIf="mensagem" class="text-green-600 mb-3">
      {{ mensagem }}
    </div>

    <button (click)="registrar()"
            class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">
      Cadastrar
    </button>
  </div>
</div>
<app-footer></app-footer>
