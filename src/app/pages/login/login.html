<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-green-700">Login</h2>

    <div class="mb-4">
      <label class="block mb-1">Email</label>
      <input type="email" [(ngModel)]="email"
             class="w-full px-3 py-2 border rounded" placeholder="Digite seu email">
    </div>

    <div class="mb-4">
      <label class="block mb-1">Senha</label>
      <input type="password" [(ngModel)]="senha"
             class="w-full px-3 py-2 border rounded" placeholder="Digite sua senha">
    </div>

    <div *ngIf="erro" class="text-red-500 mb-4">{{ erro }}</div>

    <button (click)="login()"
            class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition" [disabled]="carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    
  
</button>

    <!-- 🔽 Link de Registro -->
    <div class="mt-4 text-center">
      <span class="text-sm text-gray-600">
        Ainda não tem conta?
      </span>
      <a routerLink="/registro"
         class="text-blue-600 hover:text-green-800 font-medium ml-1 cursor-pointer">
        Criar conta
      </a>
    </div>
  </div>
</div>
<app-footer> </app-footer>
