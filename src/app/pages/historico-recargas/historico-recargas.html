<div class="max-w-4xl mx-auto p-4">

  <!-- TÍTULO -->
  <h2 class="text-xl font-bold mb-2 flex items-center gap-2">
    <i class="fa-solid fa-receipt text-green-600"></i>
    Histórico de Recargas
  </h2>

  <!-- ⏱️ ÚLTIMA ATUALIZAÇÃO -->
  <div class="text-xs text-gray-400 mb-4">
    Atualizado em {{ ultimaAtualizacao | date:'shortTime' }}
  </div>

  <!-- 🔍 FILTROS STATUS -->
  <div class="flex flex-wrap gap-2 mb-3">

    <button 
      (click)="filtroStatus='todos'; aplicarFiltros()"
      class="px-3 py-1 border rounded"
      [class.bg-gray-200]="filtroStatus==='todos'"
    >
      Todos
    </button>

    <button 
      (click)="filtroStatus='APROVADO'; aplicarFiltros()"
      class="px-3 py-1 border rounded text-green-600"
      [class.bg-green-100]="filtroStatus==='APROVADO'"
    >
      Aprovados
    </button>

    <button 
      (click)="filtroStatus='PENDENTE'; aplicarFiltros()"
      class="px-3 py-1 border rounded text-yellow-600"
      [class.bg-yellow-100]="filtroStatus==='PENDENTE'"
    >
      Pendentes
    </button>

    <button 
      (click)="filtroStatus='REJEITADO'; aplicarFiltros()"
      class="px-3 py-1 border rounded text-red-600"
      [class.bg-red-100]="filtroStatus==='REJEITADO'"
    >
      Rejeitados
    </button>

    

  </div>

  <!-- ADMIN FILTRO -->
  <div *ngIf="isAdmin" class="mb-4">
    <input
      type="text"
      [(ngModel)]="filtroUsuario"
      (input)="aplicarFiltros()"
      placeholder="🔎 Filtrar por email ou nome do cliente"
      class="w-full border rounded px-3 py-2 text-sm"
    />
  </div>

  <!-- 📭 SEM RESULTADOS -->
  <div *ngIf="recargasFiltradas.length === 0"
       class="text-center text-gray-400 py-10">
    Nenhuma recarga encontrada
  </div>

  <!-- LISTA -->
 <div *ngFor="let r of listaPaginada(); trackBy: trackById"
     class="border rounded-lg p-4 mb-3 bg-white shadow-sm">

    <!-- TOPO -->
    <div class="flex justify-between items-center">

      <div class="font-bold text-green-700">
        R$ {{ r.valor | number:'1.2-2' }}
      </div>

      <span class="text-xs px-2 py-1 rounded"
            [ngClass]="statusClass(r.status)">
        {{ r.status }}
      </span>

    </div>

    <!-- INFOS -->
    <div class="text-xs text-gray-600 mt-2 space-y-1">
      <div>👤 {{ r.nome }}</div>
      <div>📧 {{ r.email }}</div>

      <!-- 📱 NOVO: NÚMERO RECARGADO -->
      <div>📱 {{ r.numero }}</div>

      <div>📅 {{ r.data | date:'short' }}</div>
    </div>

      <!-- ADMIN CHECKBOX -->
    <div *ngIf="isAdmin" class="mt-2 flex items-center gap-2">
      <input
        type="checkbox"
        [checked]="r.chequeo"
        (change)="toggleChequeo(r, $event)"
      />
      <span class="text-xs text-gray-600">Revisado</span>
    </div>

    <!-- AÇÕES -->
    <div class="flex gap-2 mt-3">

      <!-- 🖨️ IMPRIMIR -->
      <button
        (click)="imprimirRecarga(r)"
        class="flex-1 bg-gray-100 hover:bg-gray-200 text-xs py-2 rounded flex items-center justify-center gap-1"
      >
        <i class="fa-solid fa-print"></i>
        Imprimir
      </button>

      <!-- 🔗 COMPARTILHAR (GENÉRICO) -->
      <button
        (click)="compartilharRecarga(r)"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 rounded flex items-center justify-center gap-1"
      >
        <i class="fa-solid fa-share-nodes"></i>
        Compartilhar
      </button>


    </div>


  </div>
  <div class="flex gap-2 justify-center mt-4">

  <button
    *ngFor="let p of paginas()"
    (click)="mudarPagina(p)"
    class="px-3 py-1 border rounded"
    [ngClass]="{
      'bg-blue-600 text-white': paginaAtual === p
    }"
  >
    {{ p }}
  </button>

</div>

</div>
