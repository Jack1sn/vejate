<div class="max-w-4xl mx-auto p-4">

  <!-- TÍTULO -->
  <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
    <i class="fa-solid fa-receipt text-green-600"></i>
    Histórico de Recargas
  </h2>

  <!-- 🔍 FILTROS STATUS -->
  <div class="flex flex-wrap gap-2 mb-3">

    <button (click)="filtroStatus='todos'" class="px-3 py-1 border rounded">
      Todos
    </button>

    <button (click)="filtroStatus='aprovado'" class="px-3 py-1 border rounded text-green-600">
      Aprovados
    </button>

    <button (click)="filtroStatus='pendente'" class="px-3 py-1 border rounded text-yellow-600">
      Pendentes
    </button>

    <button (click)="filtroStatus='rejeitado'" class="px-3 py-1 border rounded text-red-600">
      Rejeitados
    </button>

  </div>

  <!-- ADMIN FILTRO -->
  <div *ngIf="isAdmin" class="mb-4">

    <input
      type="text"
      [(ngModel)]="filtroUsuario"
      placeholder="🔎 Filtrar por email ou nome do cliente"
      class="w-full border rounded px-3 py-2 text-sm"
    />

  </div>

  <!-- LISTA -->
  <div *ngFor="let r of recargas"
       class="border rounded-lg p-4 mb-3 bg-white shadow-sm">

    <!-- TOPO -->
    <div class="flex justify-between items-center">

      <div class="font-bold text-green-700">
        R$ {{ r.valor | number:'1.2-2' }}
      </div>

      <span class="text-xs px-2 py-1 rounded"
            [ngClass]="statusClass(r.status)">
        {{ r.status }}
      </span>

    </div>

    <!-- INFOS -->
    <div class="text-xs text-gray-600 mt-2 space-y-1">
      <div>👤 {{ r.nome }}</div>
      <div>📧 {{ r.email }}</div>
      <div>📅 {{ r.data | date:'short' }}</div>
    </div>

    <!-- AÇÕES -->
    <div class="flex gap-2 mt-3">

      <!-- 🖨️ IMPRIMIR -->
      <button
        (click)="imprimirRecarga(r)"
        class="flex-1 bg-gray-100 hover:bg-gray-200 text-xs py-2 rounded flex items-center justify-center gap-1"
      >
        <i class="fa-solid fa-print"></i>
        Imprimir
      </button>

      <!-- 📲 WHATSAPP -->
      <button
        (click)="compartilharWhatsApp(r)"
        class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs py-2 rounded flex items-center justify-center gap-1"
      >
        <i class="fa-brands fa-whatsapp"></i>
        Compartilhar
      </button>

    </div>

  </div>

</div>
