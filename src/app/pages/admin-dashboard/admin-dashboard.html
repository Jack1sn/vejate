<div class="p-6">

  <!-- ================= HEADER ================= -->
  <h1 class="text-2xl font-light tracking-wide mb-6">
    📊 Dashboard Administrativo
  </h1>

  <!-- ================= FILTROS ================= -->
  <div class="grid md:grid-cols-4 gap-3 mb-6">

    <input
      [(ngModel)]="filtroTexto"
      placeholder="Nome ou email"
      class="border px-3 py-2 rounded text-sm"
    />

    <select [(ngModel)]="filtro" class="border px-3 py-2 rounded text-sm">
      <option value="todos">Todos</option>
      <option value="pendente">Pendentes</option>
      <option value="aprovado">Aprovados</option>
      <option value="rejeitado">Rejeitados</option>
    </select>

    <input
      type="date"
      [(ngModel)]="filtroData"
      class="border px-3 py-2 rounded text-sm"
    />

    <button
      (click)="pagina.set(1)"
      class="bg-gray-100 hover:bg-gray-200 rounded px-3 py-2 text-sm"
    >
      🔄 Reset
    </button>

  </div>

  <!-- ================= LISTA ================= -->
  <div class="space-y-4">

    <div *ngFor="let r of listaPaginada()"
         class="border rounded-lg p-4 flex flex-col md:flex-row md:justify-between gap-4">

      <!-- ================= INFO ================= -->
      <div class="space-y-1 font-light">

        <p class="font-medium">📧 {{ r.email }}</p>

        <p class="text-sm text-gray-600">
          👤 {{ r.nome }}
        </p>

        <!-- ✅ AGORA USA saldo direto -->
        <p class="text-sm text-gray-600">
          💰 Saldo atual: R$ {{ r.saldo ?? 0 }}
        </p>

        <p>💸 Valor recarga: R$ {{ r.valor }}</p>

        <p class="text-sm text-gray-500">
          📅 {{ r.data | date:'short' }}
        </p>

        <p class="text-sm">
          Status:
          <span [ngClass]="{
            'text-yellow-500': r.status === 'PENDENTE',
            'text-green-600': r.status === 'APROVADO',
            'text-red-500': r.status === 'REJEITADO'
          }">
            {{ r.status }}
          </span>
        </p>

      </div>

      <!-- ================= AÇÕES ================= -->
      <div class="flex flex-col gap-3 items-end">

        <!-- BOTÕES -->
        <div *ngIf="r.status === 'PENDENTE'" class="flex gap-2">

          <!-- ✅ continua usando ID da recarga -->
          <button
          (click)="alterarStatus(r.id, 'APROVADO')"
            class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 transition text-sm"
          >
            Aprovar
          </button>

          <button
           (click)="alterarStatus(r.id, 'REJEITADO')"
            class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 transition text-sm"
          >
            Rejeitar
          </button>

        </div>

        <!-- ================= SALDO ================= -->
        <div class="flex gap-2 items-center">

          <!-- ✅ AGORA CHAVE É usuarioId -->
          <input
            type="number"
            [ngModel]="valoresSaldo()[r.usuarioId]"
            (ngModelChange)="atualizarSaldoTemp(r.usuarioId, $event)"
            placeholder="Saldo"
            class="border px-2 py-1 w-24 rounded text-sm"
          />

          <!-- 🔥 AQUI ESTAVA O BUG PRINCIPAL -->
          <button
            (click)="adicionarSaldo(r.usuarioId)"
            class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 transition text-sm"
          >
            + Saldo
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- ================= PAGINAÇÃO ================= -->
  <div class="flex justify-center gap-2 mt-6">

    <button
      *ngFor="let p of paginas()"
      (click)="mudarPagina(p)"
      class="px-3 py-1 border rounded text-sm"
      [ngClass]="{
        'bg-green-600 text-white': pagina() === p
      }"
    >
      {{ p }}
    </button>

  </div>

</div>
