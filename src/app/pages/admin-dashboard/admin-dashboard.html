<div class="p-6">

  <!-- ================= HEADER ================= -->
  <h1 class="text-2xl font-light tracking-wide mb-6">
    📊 Dashboard Administrativo
  </h1>

  <!-- ================= BUSCA USUÁRIO (SALDO) ================= -->
  <div class="mb-6 p-4 border rounded-lg bg-gray-50">

    <h2 class="text-sm font-medium mb-3">
      💰 Adicionar saldo ao usuário
    </h2>

    <input
      type="text"
      [(ngModel)]="buscaEmail"
      (ngModelChange)="filtrarUsuarios()"
      placeholder="Digite o email do cliente"
      class="border px-3 py-2 rounded text-sm w-full mb-2"
    />

    <!-- LISTA FILTRADA -->
    <div *ngIf="usuariosFiltrados.length > 0" class="border rounded bg-white mb-3">

      <div
        *ngFor="let u of usuariosFiltrados"
        (click)="selecionarUsuario(u)"
        class="p-2 hover:bg-gray-100 cursor-pointer text-sm"
      >
        📧 {{ u.email }} - {{ u.nome }}
      </div>

    </div>

    <!-- SELECIONADO -->
    <div *ngIf="usuarioSelecionado as u" class="text-sm mb-3">
      ✔️ Selecionado: {{ u.email }}
    </div>

    <!-- INPUT SALDO -->
    <input
      type="number"
      [(ngModel)]="valoresSaldo()[usuarioSelecionado?.id || '']"
      (ngModelChange)="atualizarSaldoTemp(usuarioSelecionado?.id || '', $event)"
      placeholder="Valor do saldo"
      class="border px-3 py-2 rounded text-sm w-full mb-3"
    />

    <!-- BOTÃO SALDO -->
    <button
      (click)="usuarioSelecionado && adicionarSaldo(usuarioSelecionado.id)"
      class="bg-blue-600 text-white px-3 py-2 rounded hover:bg-blue-700 transition text-sm w-full"
    >
      + Saldo
    </button>

  </div>

  <!-- ================= FILTROS RECARGA ================= -->
  <div class="grid md:grid-cols-4 gap-3 mb-6">

    <input
      [(ngModel)]="filtroTexto"
      placeholder="Nome ou email"
      class="border px-3 py-2 rounded text-sm"
    />

    <select
      [(ngModel)]="filtro"
      class="border px-3 py-2 rounded text-sm"
    >
      <option value="todos">Todos</option>
      <option value="PENDENTE">Pendentes</option>
      <option value="APROVADO">Aprovados</option>
      <option value="REJEITADO">Rejeitados</option>
    </select>

    <input
      type="date"
      [(ngModel)]="filtroData"
      class="border px-3 py-2 rounded text-sm"
    />

    <button
      (click)="pagina.set(1)"
      class="bg-gray-100 hover:bg-gray-200 rounded px-3 py-2 text-sm"
    >
      🔄 Reset
    </button>

  </div>

  <!-- ================= LISTA RECARGAS ================= -->
  <div class="space-y-4">

    <div
      *ngFor="let r of listaPaginada()"
      class="border rounded-lg p-4 flex flex-col md:flex-row md:justify-between gap-4"
    >

      <!-- INFO -->
      <div class="space-y-1 font-light">

        <p class="font-medium">📧 {{ r.email }}</p>
        <p class="text-sm text-gray-600">👤 {{ r.nome }}</p>

        <p class="text-sm text-gray-600">
          💰 Saldo atual: R$ {{ getSaldo(r.id) }}
        </p>

        <p>💸 Valor recarga: R$ {{ r.valor }}</p>

        <p class="text-sm text-gray-500">
          📅 {{ r.data | date:'short' }}
        </p>

        <!-- STATUS -->
        <div class="text-sm pt-1">

          <span class="font-medium">Status:</span>

          <span
            class="font-semibold"
            [ngClass]="{
              'text-yellow-500': r.status === 'PENDENTE',
              'text-green-600': r.status === 'APROVADO',
              'text-red-500': r.status === 'REJEITADO'
            }"
          >
            {{ r.status }}
          </span>

          <button
            (click)="toggleMenuStatus(r.id)"
            class="ml-2 text-blue-600 hover:underline text-xs"
          >
            Atualizar status
          </button>

          <div *ngIf="menuStatusAberto === r.id" class="mt-3 flex gap-2 flex-wrap">

            <button (click)="alterarStatus($event, r.id, 'APROVADO')"
              class="bg-green-600 text-white px-3 py-1 rounded text-xs">
              APROVAR
            </button>

            <button (click)="alterarStatus($event, r.id, 'PENDENTE')"
              class="bg-yellow-500 text-white px-3 py-1 rounded text-xs">
              PENDENTE
            </button>

            <button (click)="alterarStatus($event, r.id, 'REJEITADO')"
              class="bg-red-600 text-white px-3 py-1 rounded text-xs">
              REJEITAR
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- ================= PAGINAÇÃO ================= -->
  <div class="flex justify-center gap-2 mt-6">

    <button
      *ngFor="let p of paginas()"
      (click)="mudarPagina(p)"
      class="px-3 py-1 border rounded text-sm"
      [ngClass]="{ 'bg-green-600 text-white': pagina() === p }"
    >
      {{ p }}
    </button>

  </div>

</div>
