<div class="p-6">
  <h1 class="text-3xl font-bold text-green-700 mb-4">Resultados da Busca</h1>

  <!-- Se houver resultados -->
  <div *ngIf="resultados.length > 0; else nenhumResultado">
    <div class="grid md:grid-cols-3 gap-6">
      <div *ngFor="let r of resultados" class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
        <h2 class="text-lg font-bold text-green-700 mb-2">{{ r.titulo }}</h2>
        <p class="text-gray-600 text-sm mb-1">Categoria: {{ r.categoria }}</p>
        <p class="text-gray-700 mb-2">{{ r.descricao }}</p>
        <div class="mt-2 p-3 bg-gray-50 border rounded text-gray-800 text-sm">
          <strong>Modo de preparo:</strong>
          <ul class="list-decimal list-inside space-y-1 mt-1">
            <li *ngFor="let etapa of r.modoPreparo">
              <span *ngIf="etapa.medida"><strong>{{ etapa.medida }} - </strong></span>
              {{ etapa.descricao }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Mensagem quando nenhum resultado é encontrado -->
  <ng-template #nenhumResultado>
    <p class="text-red-600 font-semibold mt-6">
      Nenhuma receita encontrada para "{{ termoAtual }}".
    </p>
  </ng-template>

  <!-- Histórico -->
  <div *ngIf="historico.length > 0" class="mt-6">
    <h2 class="font-bold text-green-700 mb-2">Últimas buscas:</h2>
    <ul class="list-disc list-inside text-gray-700">
      <li *ngFor="let h of historico">{{ h }}</li>
    </ul>
  </div>
</div>
