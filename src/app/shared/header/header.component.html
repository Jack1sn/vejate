<header
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300"
  [ngClass]="{
    'bg-white shadow-md': scrolled,
    'bg-green-700 text-white': !scrolled
  }"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">

    <!-- Logo -->
    <a routerLink="/home"
       class="text-xl sm:text-2xl font-bold"
       [ngClass]="{
         'text-green-700': scrolled,
         'text-white': !scrolled
       }">
      🌿 VEJATE
    </a>

    <!-- Desktop -->
    <nav class="hidden md:flex items-center gap-6">

      <a routerLink="/home" class="hover:text-green-400">Home</a>
      <a routerLink="/categoria/imunidade">Imunidade</a>
      <a routerLink="/categoria/calmante">Calmante</a>
      <a routerLink="/categoria/foco">Foco</a>
      <a routerLink="/categoria/digestao">Digestão</a>
      <a routerLink="/categoria/dor">Dor</a>

      <!-- Busca -->
      <div class="relative">
        <input
          type="text"
          placeholder="Buscar..."
          [(ngModel)]="termoBusca"
          class="w-32 sm:w-40 md:w-52 px-3 py-2 rounded-full border text-sm text-black"
        />
      </div>

      <!-- Botão -->
      <a routerLink="/doar"
         class="bg-green-600 text-white px-4 py-2 rounded-full hover:bg-green-700">
        Doar
      </a>

    </nav>

    <!-- Mobile Button -->
    <button class="md:hidden text-2xl" (click)="toggleMenu()">
      ☰
    </button>

  </div>

  <!-- MOBILE MENU -->
  <div *ngIf="menuAberto"
       class="md:hidden bg-white px-4 py-4 space-y-4 shadow-md">

    <a routerLink="/home" (click)="toggleMenu()">Home</a>
    <a routerLink="/categoria/imunidade" (click)="toggleMenu()">Imunidade</a>
    <a routerLink="/categoria/calmante" (click)="toggleMenu()">Calmante</a>
    <a routerLink="/categoria/foco" (click)="toggleMenu()">Foco</a>
    <a routerLink="/categoria/digestao" (click)="toggleMenu()">Digestão</a>
    <a routerLink="/categoria/dor" (click)="toggleMenu()">Dor</a>

    <input
      type="text"
      placeholder="Buscar..."
      [(ngModel)]="termoBusca"
      class="w-full px-4 py-2 border rounded-lg"
    />

    <button
      (click)="buscar()"
      class="w-full bg-green-600 text-white py-2 rounded-lg">
      Buscar
    </button>

  </div>
</header>
