<header 
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300"
  [ngClass]="{
    'bg-white shadow-md': scrolled,
    'bg-green-700 text-white': !scrolled
  }"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">

    <!-- Logo -->
    <a
      routerLink="/home"
      class="text-lg sm:text-xl md:text-2xl font-bold flex items-center gap-2"
      [ngClass]="{
        'text-green-700': scrolled,
        'text-white': !scrolled
      }"
    >
      🌿 VEJATE
    </a>

    <!-- Desktop -->
    <nav class="hidden md:flex items-center gap-5 lg:gap-6 text-sm lg:text-base">

      <a routerLink="/home">Home</a>
        <a routerLink="/cliente">Todos</a>
      <a routerLink="/categoria/imunidade">Imunidade</a>
      <a routerLink="/categoria/calmante">Calmante</a>
      <a routerLink="/categoria/foco">Foco</a>
      <a routerLink="/categoria/digestao">Digestão</a>
      <a routerLink="/categoria/dor">Dor</a>

      <!-- NOVO BOTÃO RECARGA -->
      <button
        (click)="toggleRecarga()"
        class="hover:text-green-400 font-medium"
      >
        🌍 Recarga
      </button>

      <!-- SALDO -->
<div *ngIf="estaLogado()" class="flex items-center gap-4">

  <div class="font-semibold">
    💰 R$ {{ usuario()?.saldo }}
  </div>

  <!-- Recarga -->
  <div> 
  <a
  routerLink="/doar"
    
    class="hover:text-green-400 font-medium"
  >
    + Saldo
  </a>
</div>
  <!-- NOME -->
  <span class="font-medium">
    👤 Olá, {{ nomeUsuario() }}
  </span>

  <!-- Logout -->
  <button
    (click)="logout()"
    class="bg-red-500 text-white px-3 py-1 rounded"
  >
    Sair
  </button>

</div>

<!-- NÃO LOGADO -->
<div *ngIf="!estaLogado()">
  <a
    routerLink="/login"
    class="bg-green-600 text-white px-4 py-2 rounded-full"
  >
    Login
  </a>
</div>

    </nav>

    <!-- Mobile -->
    <button class="md:hidden text-2xl" (click)="toggleMenu()">
      ☰
    </button>

  </div>

  <!-- MOBILE MENU -->
  <div
    *ngIf="menuAberto"
    class="md:hidden bg-white px-5 py-5 space-y-4 shadow-md text-black"
  >
    <a routerLink="/home" (click)="toggleMenu()">Home</a>
    <a routerLink="/categoria/imunidade" (click)="toggleMenu()">Imunidade</a>
    <a routerLink="/categoria/calmante" (click)="toggleMenu()">Calmante</a>
    <a routerLink="/categoria/foco" (click)="toggleMenu()">Foco</a>
    <a routerLink="/categoria/digestao" (click)="toggleMenu()">Digestão</a>
    <a routerLink="/categoria/dor" (click)="toggleMenu()">Dor</a>

    <!-- RECARGA MOBILE -->
    <a (click)="abrirRecargaMobile()">🌍 Recarga</a>

   <div *ngIf="estaLogado()" class="space-y-3">

  <div class="font-semibold text-center">
    💰 Saldo: R$ {{ auth.usuario()?.saldo }}
  </div>
  <div class="text-center font-medium">
  👤 Olá, {{ nomeUsuario() }}
</div>

  <a (click)="abrirRecargaMobile()">🌍 Recarga</a>

  <button
    (click)="logout()"
    class="w-full bg-red-500 text-white py-2 rounded"
  >
    Sair
  </button>

</div>

<div *ngIf="!estaLogado()">
  <a
    routerLink="/login"
    class="block text-center bg-green-600 text-white py-2 rounded"
  >
    Login
  </a>
</div>
  </div>
</header>

<!-- MODAL RECARGA -->
<div
  *ngIf="recargaAberta"
  class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
  (click)="fecharRecarga()"
>
  <div
    class="bg-white w-[95%] max-w-md rounded-xl p-6 relative"
    (click)="$event.stopPropagation()"
  >

    <button
      (click)="fecharRecarga()"
      class="absolute top-3 right-3 text-xl"
    >
      ✖
    </button>

    <app-credito></app-credito>

  </div>
</div>
